modLoader="javafml"
loaderVersion="[1,)"
license="${mod_license}"
issueTrackerURL="https://github.com/Thiov/alexscaves-neoforge/issues"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
logoFile="assets/alexscaves/icon.png"
enumExtensions="META-INF/enumextensions.json"
authors="Alexthe668, Noonyeyz; NeoForge 26.1.2 port by Thiov"
description='''
Alex's Caves - explore rare cave biomes hidden deep beneath the Overworld surface, each with unique mobs, blocks and items. This NeoForge 26.1.2 build requires the standalone Citadel library installed separately (the same Citadel that Alex's Mobs uses), so it can be installed alongside Alex's Mobs. Original mod by Alexthe668 and Noonyeyz; this port is maintained by Thiov and is not affiliated with or endorsed by the original authors.
'''

[[mixins]]
config="alexscaves.mixins.json"

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="${neo_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="citadel"
    type="required"
    reason="Alex's Caves uses the Citadel library (the animation/entity framework). Install the standalone Citadel (NeoForge) mod."
    versionRange="*"
    ordering="AFTER"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="jei"
    type="optional"
    versionRange="*"
    ordering="AFTER"
    side="BOTH"
